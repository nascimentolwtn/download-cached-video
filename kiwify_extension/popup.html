<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .container {
      padding: 20px;
    }
    h1 {
      font-size: 18px;
      margin-bottom: 15px;
      color: #222;
    }
    .status {
      background: white;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      border-left: 4px solid #999;
    }
    .status.capturing {
      border-left-color: #e74c3c;
      background: #fff5f5;
    }
    .status.ready {
      border-left-color: #27ae60;
      background: #f5fff5;
    }
    .status-label {
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 600;
      color: #666;
      margin-bottom: 5px;
    }
    .status-value {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .status.capturing .status-value {
      color: #e74c3c;
    }
    .status.ready .status-value {
      color: #27ae60;
    }
    .entry-count {
      font-size: 13px;
      color: #666;
      margin-top: 8px;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    button {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    button:active {
      transform: translateY(0);
    }
    .btn-stop {
      background: #e74c3c;
      color: white;
    }
    .btn-stop:hover {
      background: #c0392b;
    }
    .btn-stop:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
      transform: none;
    }
    .btn-save {
      background: #27ae60;
      color: white;
    }
    .btn-save:hover {
      background: #229954;
    }
    .btn-save:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
      transform: none;
    }
    .btn-reset {
      background: #95a5a6;
      color: white;
      flex: 0;
      padding: 10px 12px;
    }
    .btn-reset:hover {
      background: #7f8c8d;
    }
    .info {
      background: white;
      border-radius: 8px;
      padding: 15px;
      margin-top: 15px;
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
    .info p {
      margin-bottom: 8px;
    }
    .info p:last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Kiwify Video Downloader</h1>

    <div class="status ready" id="status">
      <div class="status-label">Status</div>
      <div class="status-value" id="statusText">Waiting...</div>
      <div class="entry-count" id="entryCount">0 entries captured</div>
    </div>

    <div class="buttons">
      <button class="btn-stop" id="stopBtn" disabled>Stop Capture</button>
      <button class="btn-save" id="saveBtn" disabled>Save HAR</button>
      <button class="btn-reset" id="resetBtn" title="Clear captured data">↻</button>
    </div>

    <div class="info">
      <p><strong>How it works:</strong></p>
      <p>1. Extension auto-starts when video plays</p>
      <p>2. Click "Stop Capture" when done</p>
      <p>3. Click "Save HAR" to download the file</p>
      <p>4. Use HAR with the download script</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
